experiment_name: 'parti_pooling_ProtT5'

seed: 123
eval_on_test: True
num_epochs: 5000
batch_size: 256
log_iterations: 100
patience: 80
optimizer_parameters:
  lr: 1.0e-4

# Paths to Embeddings (per-residue ProtT5)
train_embeddings: 'data_files/deeploc_our_train_set.h5'
val_embeddings:   'data_files/deeploc_our_val_set.h5'
test_embeddings:  'data_files/deeploc_test_set.h5'

# Paths to Fasta files
train_remapping: 'data_files/deeploc_our_train_set.fasta'
val_remapping:   'data_files/deeploc_our_val_set.fasta'
test_remapping:  'data_files/deeploc_test_set.fasta'

key_format: 'fasta_descriptor'

# Pool PaRTI weights, generated with scripts/data/extract_parti_weights.py from the frozen backbone.
train_parti_weights: 'data_files/deeploc_our_train_set_parti.h5'
val_parti_weights:   'data_files/deeploc_our_val_set_parti.h5'
test_parti_weights:  'data_files/deeploc_test_set_parti.h5'

# Model parameters
model_type: 'PoolingFFN'
model_parameters:
  output_dim: 10
  hidden_dim: 32
  n_hidden_layers: 0
  dropout: 0.25
  pooling: 'parti'
  proj_dim: 0
