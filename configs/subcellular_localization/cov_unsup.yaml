experiment_name: 'loc_unsup_cov_ProtT5'

seed: 657
eval_on_test: True
num_epochs: 5000
batch_size: 150
log_iterations: 100
patience: 80
optimizer_parameters:
  lr: 1.0e-4

# Layer-24 DeepLoc embeddings (integer-keyed) + remapped fastas.
train_embeddings: 'data_files/deeploc_our_train_set_layer24.h5'
val_embeddings:   'data_files/deeploc_our_val_set_layer24.h5'
test_embeddings:  'data_files/deeploc_test_set_layer24.h5'

train_remapping: 'data_files/deeploc_our_train_set_remapped.fasta'
val_remapping:   'data_files/deeploc_our_val_set_remapped.fasta'
test_remapping:  'data_files/deeploc_test_set_remapped.fasta'

key_format: 'hash'
embedding_mode: 'lm'

# Frozen unsupervised covariance pooling. run_sweep.py overrides proj_dim and
# cov_unsup_checkpoint per d_c (and --cov_unsup_dir selects union vs per-task).
model_type: 'PoolingFFN'
model_parameters:
  output_dim: 10
  hidden_dim: 32
  n_hidden_layers: 0
  dropout: 0.25
  pooling: 'cov_unsup'
  proj_dim: 48
  cov_unsup_checkpoint: runs/cov_unsup_pretrained/cov_unsup_dc48.pt
  freeze_cov_projections: true
