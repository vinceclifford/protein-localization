experiment_name: smoke_loc_cov_unsup
model_type: PoolingFFN
loss_function: JointCrossEntropy
optimizer: Adam
optimizer_parameters:
  lr: 0.0001

num_epochs: 1
batch_size: 2
patience: 1
seed: 123
log_iterations: 1
eval_on_test: false

train_embeddings: data_files/deeploc_our_train_set.h5
train_remapping: data_files/deeploc_our_train_set.fasta
val_embeddings: data_files/deeploc_our_val_set.h5
val_remapping: data_files/deeploc_our_val_set.fasta
test_embeddings: data_files/deeploc_test_set.h5
test_remapping: data_files/deeploc_test_set.fasta

key_format: fasta_descriptor
embedding_mode: lm
max_length: 512
unknown_solubility: null

model_parameters:
  output_dim: 12
  hidden_dim: 4
  n_hidden_layers: 0
  dropout: 0.0
  pooling: cov_unsup
  proj_dim: 2
  cov_unsup_checkpoint: runs/cov_unsup_deeploc_smoke/cov_unsup_deeploc_dc2.pt
  freeze_cov_projections: true