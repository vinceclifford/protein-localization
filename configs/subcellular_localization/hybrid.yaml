experiment_name: 'hybrid_pooling_ProtT5'

seed: 123
eval_on_test: True
num_epochs: 5000
batch_size: 150
log_iterations: 100
patience: 80
optimizer_parameters:
  lr: 1.0e-4

# Paths to Embeddings (per-residue ProtT5, last layer)
train_embeddings: 'data_files/deeploc_our_train_set_layer24.h5'
val_embeddings:   'data_files/deeploc_our_val_set_layer24.h5'
test_embeddings:  'data_files/deeploc_test_set_layer24.h5'

# Remapped FASTAs (numeric ids matching the h5 keys)
train_remapping: 'data_files/deeploc_our_train_set_remapped.fasta'
val_remapping:   'data_files/deeploc_our_val_set_remapped.fasta'
test_remapping:  'data_files/deeploc_test_set_remapped.fasta'

key_format: 'hash'

# Model parameters
# Hybrid = [mu ; flat(C)] with C = (1/L)(XL)^T(XR). Pooled size = d + d_c^2.
# For ProtT5 (d=1024) and d_c=32: 1024 + 1024 = 2048 features.
model_type: 'PoolingFFN'
model_parameters:
  output_dim: 10
  hidden_dim: 32
  n_hidden_layers: 0
  dropout: 0.25
  pooling: 'hybrid'
  proj_dim: 32        # d_c; size sweep: {8, 16, 24, 32, 48}
