experiment_name: 'cov_unsup_pretrain_deeploc'

# Per-task (DeepLoc-only) covariance-projection pretraining — for the
# projection-dataset ablation (shared union vs task-specific).

seed: 657
num_epochs: 100
batch_size: 8
patience: 10
lr: 1.0e-3
proj_dim: 48
log_iterations: 50
min_delta: 0.005
output_dir: 'runs/cov_unsup_deeploc'

max_length: 2048
embedding_mode: 'lm'

sources:
  - dataset: 'localization'
    embeddings: 'data_files/deeploc_our_train_set_layer24.h5'
    remapping:  'data_files/deeploc_our_train_set_remapped.fasta'
    key_format: 'hash'
