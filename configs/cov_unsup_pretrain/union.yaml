experiment_name: 'cov_unsup_pretrain_union'

# Unsupervised covariance-projection pretraining (spec section 3.1 / 5.1).
# Train L, R once on the UNION of all task TRAIN splits, then freeze and reuse.
# Sweep proj_dim (d_c) over {8,16,24,32,48} via --proj_dim; one checkpoint per d_c:
# runs/cov_unsup_pretrained/cov_unsup_dc{d_c}.pt

seed: 657
num_epochs: 100
batch_size: 8
patience: 10
lr: 1.0e-3
proj_dim: 48
log_iterations: 50
min_delta: 0.005
output_dir: 'runs/cov_unsup_pretrained'

max_length: 2048
embedding_mode: 'lm'

# Only TRAIN splits — val/test of either task are never seen during pretraining.
# NOTE: the .h5 paths below are the layer-24 embeddings; adjust to your machine.
sources:
  - dataset: 'localization'
    embeddings: 'data_files/deeploc_our_train_set_layer24.h5'
    remapping:  'data_files/deeploc_our_train_set_remapped.fasta'
    key_format: 'hash'
  - dataset: 'meltome'
    embeddings: 'data_files/flip_meltome/prepared/human_cell/human_cell_train_layer24.h5'
    remapping:  'data_files/flip_meltome/prepared/human_cell/human_cell_train_remapped.fasta'
    key_format: 'hash'
