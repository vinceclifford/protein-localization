experiment_name: 'meltome_unsup_cov_pooling_ProtT5'

seed: 123
eval_on_test: True
num_epochs: 5000
batch_size: 200
log_iterations: 100
patience: 80
optimizer_parameters:
  lr: 1.0e-4

loss_function: 'MeltomeMSELoss'
target: 'meltome'
max_length: 6000
embedding_mode: 'lm'

# Paths to FLIP Meltome mixed split embeddings (layer-24, matching the frozen projections)
train_embeddings: 'data_files/flip_meltome/prepared/human_cell/human_cell_train_layer24.h5'
val_embeddings:   'data_files/flip_meltome/prepared/human_cell/human_cell_val_layer24.h5'
test_embeddings:  'data_files/flip_meltome/prepared/human_cell/human_cell_test_layer24.h5'

train_remapping: 'data_files/flip_meltome/prepared/human_cell/human_cell_train_remapped.fasta'
val_remapping:   'data_files/flip_meltome/prepared/human_cell/human_cell_val_remapped.fasta'
test_remapping:  'data_files/flip_meltome/prepared/human_cell/human_cell_test_remapped.fasta'
key_format: 'hash'

# Model parameters
# Bilinear covariance: C = (1/L)(XL)^T(XR) in R^{d_c x d_c}, flattened to d_c^2 features.
model_type: 'PoolingFFN'
model_parameters:
  output_dim: 1
  hidden_dim: 32
  n_hidden_layers: 0
  dropout: 0.25
  pooling: 'cov_unsup'
  proj_dim: 32
  cov_unsup_checkpoint: runs/cov_unsup_pretrained/cov_unsup_dc32.pt
  freeze_cov_projections: true
