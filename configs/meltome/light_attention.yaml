experiment_name: 'meltome_mixed_light_attention_ProtT5'

seed: 123
eval_on_test: True
num_epochs: 5000
batch_size: 200
log_iterations: 100
patience: 80
optimizer_parameters:
  lr: 5.0e-5

loss_function: 'MeltomeMSELoss'
target: 'meltome'
max_length: 6000
embedding_mode: 'lm'

# Paths to FLIP Meltome mixed split embeddings
train_embeddings: 'data_files/flip_meltome/prepared/human_cell/human_cell_train.h5'
val_embeddings:   'data_files/flip_meltome/prepared/human_cell/human_cell_val.h5'
test_embeddings:  'data_files/flip_meltome/prepared/human_cell/human_cell_test.h5'

train_remapping: 'data_files/flip_meltome/prepared/human_cell/human_cell_train_remapped.fasta'
val_remapping:   'data_files/flip_meltome/prepared/human_cell/human_cell_val_remapped.fasta'
test_remapping:  'data_files/flip_meltome/prepared/human_cell/human_cell_test_remapped.fasta'
key_format: 'hash'

# Model parameters
model_type: 'LightAttention'
model_parameters:
  dropout: 0.25
  kernel_size: 9
  output_dim: 1
