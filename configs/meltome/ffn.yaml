experiment_name: 'meltome_mixed_ffn_ProtT5'

seed: 123
eval_on_test: True
num_epochs: 5000
batch_size: 2048
log_iterations: 100
patience: 80
optimizer_parameters:
  lr: 1.0e-4

loss_function: 'MeltomeMSELoss'
target: 'meltome'
max_length: 6000
embedding_mode: 'lm'

# FFN expects sequence-wise/reduced embeddings shaped [embedding_dim].
# Do not use the per-residue .h5 files below with FFN unless they have been reduced first.
train_embeddings: 'data_files/flip_meltome/prepared/mixed_split/mixed_split_train_reduced.h5'
val_embeddings:   'data_files/flip_meltome/prepared/mixed_split/mixed_split_val_reduced.h5'
test_embeddings:  'data_files/flip_meltome/prepared/mixed_split/mixed_split_test_reduced.h5'

train_remapping: 'data_files/flip_meltome/prepared/human_cell/human_cell_train_remapped.fasta'
val_remapping:   'data_files/flip_meltome/prepared/human_cell/human_cell_val_remapped.fasta'
test_remapping:  'data_files/flip_meltome/prepared/human_cell/human_cell_test_remapped.fasta'
key_format: 'hash'

# Model parameters
model_type: 'FFN'
model_parameters:
  output_dim: 1
  hidden_dim: 32
  n_hidden_layers: 0
  dropout: 0.25
